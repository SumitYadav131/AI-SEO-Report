<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>SEO Audit Dashboard</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        background: #0f172a;
        color: #e2e8f0;
        font-family: "Inter", sans-serif;
      }

      .card {
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 14px;
        transition: 0.3s;
      }

      .card:hover {
        transform: translateY(-3px);
      }

      .section-title {
        font-size: 12px;
        color: #94a3b8;
        margin-bottom: 10px;
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      .big-score {
        font-size: 52px;
        font-weight: 700;
      }

      .good {
        color: #22c55e;
      }
      .avg {
        color: #facc15;
      }
      .bad {
        color: #ef4444;
      }

      .wrap-text {
        word-break: break-word;
      }

      .report {
        white-space: pre-wrap;
        font-size: 13px;
        line-height: 1.6;
        color: #cbd5f5;
      }

      .progress {
        height: 6px;
        background: #334155;
      }

      .progress-bar {
        background: linear-gradient(90deg, #22c55e, #4ade80);
      }

      input {
        background: #1e293b !important;
        border: 1px solid #334155 !important;
        color: white !important;
      }

      input::placeholder {
        color: #94a3b8;
      }

      .btn-success {
        background: #22c55e;
        border: none;
      }

      .badge-box {
        background: #0f172a;
        border: 1px solid #334155;
        padding: 8px;
        border-radius: 10px;
        text-align: center;
      }
    </style>
  </head>

  <body>
    <div class="container py-5">
      <h3 class="text-center mb-4 fw-bold">🚀 SEO Audit Dashboard</h3>

      <!-- INPUT -->
      <div class="card p-3 mb-4">
        <div class="input-group">
          <input
            id="urlInput"
            class="form-control"
            placeholder="Enter website URL"
          />
          <button class="btn btn-success" onclick="analyze()">Analyze</button>
        </div>
      </div>

      <div id="loading" class="text-center mb-3 text-warning"></div>
      <div id="result"></div>
    </div>

    <script>
      function getScoreClass(score) {
        if (score >= 80) return "good";
        if (score >= 50) return "avg";
        return "bad";
      }

      async function analyze() {
        const url = document.getElementById("urlInput").value;
        const resultDiv = document.getElementById("result");
        const loading = document.getElementById("loading");

        if (!url) return alert("Enter URL");

        loading.innerText = "Analyzing...";
        resultDiv.innerHTML = "";

        try {
          const res = await fetch("http://localhost:3000/crawl", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ url, ai: true }),
          });

          const data = await res.json();
          loading.innerText = "";

          if (!data.success) {
            resultDiv.innerHTML = `<div class="alert alert-danger">${data.error}</div>`;
            return;
          }

          const score = data.analysis.score;
          const scoreClass = getScoreClass(score);

          resultDiv.innerHTML = `

    <!-- SCORE -->
    <div class="card p-4 mb-4 text-center">
      <div class="section-title">SEO SCORE</div>
      <div class="big-score ${scoreClass}">${score}/100</div>
      <div class="progress mt-3">
        <div class="progress-bar" style="width:${score}%"></div>
      </div>
    </div>

    <!-- GRID -->
    <div class="row g-4">

      <!-- BASIC -->
      <div class="col-md-6">
        <div class="card p-3 h-100">
          <div class="section-title">Basic SEO</div>
          <p class="wrap-text"><b>Title:</b> ${data.data.title || "N/A"}</p>
          <p class="wrap-text"><b>Description:</b> ${data.data.metaDescription || "Missing"}</p>
          <p><b>H1:</b> ${data.data.h1 || "Missing"}</p>
          <p><b>H2 Count:</b> ${data.data.h2Count}</p>
        </div>
      </div>

      <!-- CONTENT -->
      <div class="col-md-6">
        <div class="card p-3 h-100">
          <div class="section-title">Content</div>
          <div class="row text-center">
            <div class="col-4">
              <div class="badge-box">
                <div>${data.data.images}</div>
                <small>Images</small>
              </div>
            </div>
            <div class="col-4">
              <div class="badge-box">
                <div>${data.data.imagesWithoutAlt}</div>
                <small>No ALT</small>
              </div>
            </div>
            <div class="col-4">
              <div class="badge-box">
                <div>${data.data.links}</div>
                <small>Links</small>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- PERFORMANCE -->
      <div class="col-12">
        <div class="card p-3">
          <div class="section-title">Performance</div>

          <div class="row g-3">

            <div class="col-md-6">
              <div class="p-3 rounded border" style="background:#020617;">
                <h6>📱 Mobile</h6>
                <p>Score: ${data.pagespeed?.mobile?.performance ?? "N/A"}</p>
                <p>LCP: ${data.pagespeed?.mobile?.lcp ?? "-"}</p>
                <p>CLS: ${data.pagespeed?.mobile?.cls ?? "-"}</p>
              </div>
            </div>

            <div class="col-md-6">
              <div class="p-3 rounded border" style="background:#020617;">
                <h6>💻 Desktop</h6>
                <p>Score: ${data.pagespeed?.desktop?.performance ?? "N/A"}</p>
                <p>LCP: ${data.pagespeed?.desktop?.lcp ?? "-"}</p>
                <p>CLS: ${data.pagespeed?.desktop?.cls ?? "-"}</p>
              </div>
            </div>

          </div>
        </div>
      </div>

      <!-- ISSUES (ONLY IF EXISTS) -->
      ${
        data.analysis.issues.length > 0
          ? `
        <div class="col-md-6">
          <div class="card p-3 h-100 border-danger">
            <div class="section-title text-danger">Issues Found</div>
            <ul class="mb-0">
              ${data.analysis.issues.map((i) => `<li>${i}</li>`).join("")}
            </ul>
          </div>
        </div>
        `
          : ""
      }

      <!-- REPORT -->
      <div class="col-md-${data.analysis.issues.length > 0 ? "6" : "12"}">
        <div class="card p-3 h-100">
          <div class="section-title">AI Report</div>
          <div class="report">${data.report || "No report available"}</div>
        </div>
      </div>

    </div>
    `;
        } catch (err) {
          loading.innerText = "";
          resultDiv.innerHTML = `<div class="alert alert-danger">Error: ${err.message}</div>`;
        }
      }
    </script>
  </body>
</html>
