<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SEO Audit Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  background: #f8fafc;
  font-family: "Segoe UI", sans-serif;
}

.card {
  border-radius: 12px;
  border: 1px solid #e2e8f0;
}

.section-title {
  font-size: 13px;
  color: #64748b;
  margin-bottom: 8px;
  font-weight: 600;
}

.big-score {
  font-size: 48px;
  font-weight: bold;
}

.good { color: #16a34a; }
.avg { color: #f59e0b; }
.bad { color: #dc2626; }

.wrap-text {
  word-break: break-word;
}

.report {
  white-space: pre-wrap;
  font-size: 14px;
  line-height: 1.6;
}

.progress {
  height: 6px;
}
</style>
</head>

<body>

<div class="container py-5">

  <h3 class="text-center mb-4 fw-bold">SEO Audit Dashboard</h3>

  <!-- INPUT -->
  <div class="card p-3 mb-4">
    <div class="input-group">
      <input id="urlInput" class="form-control" placeholder="Enter website URL">
      <button class="btn btn-success" onclick="analyze()">Analyze</button>
    </div>
  </div>

  <div id="loading" class="text-center mb-3"></div>
  <div id="result"></div>

</div>

<script>
function getScoreClass(score) {
  if (score >= 80) return "good";
  if (score >= 50) return "avg";
  return "bad";
}

async function analyze() {
  const url = document.getElementById("urlInput").value;
  const resultDiv = document.getElementById("result");
  const loading = document.getElementById("loading");

  if (!url) return alert("Enter URL");

  loading.innerText = "Analyzing...";
  resultDiv.innerHTML = "";

  try {
    const res = await fetch("http://localhost:3000/crawl", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ url, ai: true })
    });

    const data = await res.json();
    loading.innerText = "";

    if (!data.success) {
      resultDiv.innerHTML = `<div class="alert alert-danger">${data.error}</div>`;
      return;
    }

    const score = data.analysis.score;
    const scoreClass = getScoreClass(score);

    resultDiv.innerHTML = `

    <!-- SCORE -->
    <div class="card p-4 mb-4 text-center">
      <div class="section-title">SEO SCORE</div>
      <div class="big-score ${scoreClass}">${score}/100</div>
      <div class="progress mt-2">
        <div class="progress-bar bg-success" style="width:${score}%"></div>
      </div>
    </div>

    <!-- MAIN GRID -->
    <div class="row g-4">

      <!-- BASIC -->
      <div class="col-md-6">
        <div class="card p-3 h-100">
          <div class="section-title">Basic SEO</div>
          <p class="wrap-text"><b>Title:</b> ${data.data.title || "N/A"}</p>
          <p class="wrap-text"><b>Description:</b> ${data.data.metaDescription || "Missing"}</p>
          <p><b>H1:</b> ${data.data.h1 || "Missing"}</p>
          <p><b>H2 Count:</b> ${data.data.h2Count}</p>
        </div>
      </div>

      <!-- CONTENT -->
      <div class="col-md-6">
        <div class="card p-3 h-100">
          <div class="section-title">Content</div>
          <p><b>Images:</b> ${data.data.images}</p>
          <p><b>Missing ALT:</b> ${data.data.imagesWithoutAlt}</p>
          <p><b>Links:</b> ${data.data.links}</p>
        </div>
      </div>

      <!-- PERFORMANCE -->
      <div class="col-12">
        <div class="card p-3">
          <div class="section-title">Performance</div>

          <div class="row">
            <div class="col-md-6">
              <div class="p-3 bg-light rounded border">
                <b>Mobile</b>
                <p>Score: ${data.pagespeed?.mobile?.performance ?? "N/A"}</p>
                <p>LCP: ${data.pagespeed?.mobile?.lcp ?? "-"}</p>
                <p>CLS: ${data.pagespeed?.mobile?.cls ?? "-"}</p>
              </div>
            </div>

            <div class="col-md-6">
              <div class="p-3 bg-light rounded border">
                <b>Desktop</b>
                <p>Score: ${data.pagespeed?.desktop?.performance ?? "N/A"}</p>
                <p>LCP: ${data.pagespeed?.desktop?.lcp ?? "-"}</p>
                <p>CLS: ${data.pagespeed?.desktop?.cls ?? "-"}</p>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- ISSUES -->
      <div class="col-md-6">
        <div class="card p-3 h-100">
          <div class="section-title">Issues</div>
          ${
            data.analysis.issues.length === 0
              ? "<span class='text-success'>No issues found</span>"
              : `<ul>${data.analysis.issues.map(i => `<li>${i}</li>`).join("")}</ul>`
          }
        </div>
      </div>

      <!-- REPORT -->
      <div class="col-md-6">
        <div class="card p-3 h-100">
          <div class="section-title">AI Report</div>
          <div class="report">${data.report || "No report available"}</div>
        </div>
      </div>

    </div>
    `;

  } catch (err) {
    loading.innerText = "";
    resultDiv.innerHTML = `<div class="alert alert-danger">Error: ${err.message}</div>`;
  }
}
</script>

</body>
</html>
